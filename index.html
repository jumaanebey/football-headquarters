<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Football Headquarters</title>
    <meta name="description" content="Build your stadium, train star heroes, and raid real rivals — a football base-builder." />
    <meta property="og:title" content="Football Headquarters" />
    <meta property="og:description" content="Build your stadium, train star heroes, and raid real rivals — a football base-builder." />
    <meta property="og:image" content="https://football-headquarters.vercel.app/assets/brand/og-image.png" />
    <meta property="og:url" content="https://football-headquarters.vercel.app" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏈</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Chakra Petch', 'sans-serif'],
            },
            colors: {
              brand: {
                dark: '#0f172a',
                accent: '#3b82f6',
                gold: '#fbbf24',
              }
            },
            animation: {
              'float': 'float 3s ease-in-out infinite',
              'bounce-sm': 'bounce-sm 1s infinite',
              'collect': 'collect 0.8s ease-out forwards',
              'hop': 'hop 0.4s infinite alternate',
              'spin-slow': 'spin 3s linear infinite',
              'fade-in': 'fade-in 0.25s ease-out',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              'bounce-sm': {
                '0%, 100%': { transform: 'translateY(-25%)', animationTimingFunction: 'cubic-bezier(0.8,0,1,1)' },
                '50%': { transform: 'none', animationTimingFunction: 'cubic-bezier(0,0,0.2,1)' },
              },
              collect: {
                '0%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                '100%': { opacity: '0', transform: 'translateY(-50px) scale(1.5)' },
              },
              hop: {
                '0%': { transform: 'translateZ(0px)' },
                '100%': { transform: 'translateZ(10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0f172a;
        color: white;
        overflow: hidden;
      }

      /* --- VOXEL ENGINE CSS --- */
      .scene {
        perspective: 1600px;
        perspective-origin: 50% 50%;
        overflow: hidden;
      }

      .world {
        transform-style: preserve-3d;
        width: 100%;
        height: 100%;
        position: absolute;
      }

      .space-3d {
        transform-style: preserve-3d;
        position: absolute;
      }

      .cube {
        transform-style: preserve-3d;
        position: absolute;
      }

      .face {
        position: absolute;
        backface-visibility: hidden;
        image-rendering: pixelated;
      }

      .face-top {
        transform-origin: top left;
        transform: rotateX(90deg) translateZ(0);
      }

      .face-front {
        transform-origin: bottom left;
        transform: rotateX(0deg) translateZ(0);
      }

      .face-right {
        transform-origin: top right;
        transform: rotateY(-90deg) translateX(100%);
      }

      .shade-top { filter: brightness(1.2); }
      .shade-front { filter: brightness(1.0); }
      .shade-right { filter: brightness(0.7); }
      .shade-left { filter: brightness(0.7); }

      .hover-lift:hover {
        transform: translateZ(10px);
      }

      /* --- BATTLE JUICE --- */
      @keyframes fhq-bob   { 0%,100% { transform: translateY(0); }   50% { transform: translateY(-3px); } }
      @keyframes fhq-pop   { 0%,100% { transform: scale(1); }        45% { transform: scale(1.22); } }
      /* Per-STEP bob: one bounce per footfall — runs at half the 0.42s stride period so
         the body rises twice per full walk cycle, synced with the fhq-q* frames. */
      @keyframes fhq-stepbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.7px); } }
      /* Impact jolt: crunch in, overshoot out — one-shot on each damage pop. */
      @keyframes fhq-hitjolt { 0% { transform: scale(0.88); } 45% { transform: scale(1.07); } 100% { transform: scale(1); } }
      /* Attack LUNGE: wind back, drive INTO the target, settle — 0.65s period matches
         the damage-pop cycle so the hit lands on the drive. -r drives right, -l left. */
      @keyframes fhq-lunge-r { 0%,60%,100% { transform: translateX(0) scale(1,1); } 12% { transform: translateX(-1.5px) scale(0.96,1.03); } 26% { transform: translateX(6px) scale(1.06,0.95); } 42% { transform: translateX(1px) scale(1,1); } }
      @keyframes fhq-lunge-l { 0%,60%,100% { transform: translateX(0) scale(1,1); } 12% { transform: translateX(1.5px) scale(0.96,1.03); } 26% { transform: translateX(-6px) scale(1.06,0.95); } 42% { transform: translateX(-1px) scale(1,1); } }
      /* Structure about to fall: rocks on its foundation (origin set at the base). */
      @keyframes fhq-wobble { 0%,100% { transform: rotate(0deg); } 28% { transform: rotate(-1.5deg); } 72% { transform: rotate(1.6deg); } }
      /* Practice-squad shuttle drill: run to the far cone (--dx/--dy per runner),
         catch your breath, run back. Facing flips at the turn (separate keyframe on
         an inner wrapper so it can't fight the position animation). */
      @keyframes fhq-drill {
        0%,6% { transform: translate(0, 0); }
        46%,54% { transform: translate(var(--dx), var(--dy)); }
        94%,100% { transform: translate(0, 0); }
      }
      @keyframes fhq-drillflip   { 0%,49.9% { transform: scaleX(1); }  50%,100% { transform: scaleX(-1); } }
      @keyframes fhq-drillflip-r { 0%,49.9% { transform: scaleX(-1); } 50%,100% { transform: scaleX(1); } }
      /* SimCity traffic: cars roll the access road end to end (--dx/--dy per car),
         fading in at the campus gate and out at the tree line. */
      @keyframes fhq-drive {
        0% { transform: translate(0, 0); opacity: 0; }
        7% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
      }
      /* Jumbotron LED face: a living screen breathes — subtle brightness flicker. */
      @keyframes fhq-ledflicker { 0%,100% { opacity: 1; } 47% { opacity: 0.86; } 52% { opacity: 0.97; } 71% { opacity: 0.9; } }
      /* Cloud shade drifting across the campus — two lanes, one wind direction. */
      @keyframes fhq-cloud1 { 0% { transform: translate(-520px, 640px); } 100% { transform: translate(1280px, -170px); } }
      @keyframes fhq-cloud2 { 0% { transform: translate(-640px, 320px); } 100% { transform: translate(1320px, -40px); } }
      /* Stadium crowd does the WAVE — three rising pulses, anchored at the bowl floor. */
      @keyframes fhq-crowdwave { 0%,100% { transform: scaleY(1); } 15% { transform: scaleY(1.28) translateY(-2px); } 32% { transform: scaleY(1); } 48% { transform: scaleY(1.2) translateY(-1.5px); } 64% { transform: scaleY(1); } 80% { transform: scaleY(1.14) translateY(-1px); } }
      @keyframes fhq-shake { 0%,100% { transform: translate(0,0); }  20% { transform: translate(-4px,2px); } 40% { transform: translate(3px,-3px); } 60% { transform: translate(-3px,2px); } 80% { transform: translate(2px,-2px); } }
      @keyframes fhq-wave  { 0%,100% { transform: translateY(0); opacity: .4; } 50% { transform: translateY(-5px); opacity: .85; } }
      /* --- BOARD AMBIENCE (build view) --- */
      @keyframes fhq-breathe { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.015); } }
      @keyframes fhq-smoke { 0% { transform: translate(0,0) scale(0.6); opacity: 0; } 15% { opacity: .45; } 100% { transform: translate(9px,-48px) scale(1.6); opacity: 0; } }
      @keyframes fhq-twinkle { 0%,100% { transform: scale(0.4) rotate(0deg); opacity: 0; } 50% { transform: scale(1) rotate(24deg); opacity: .95; } }
      @keyframes fhq-sway { 0%,100% { transform: rotate(-2.5deg); } 50% { transform: rotate(2.5deg); } }
      @keyframes fhq-glow { 0%,100% { opacity: .3; } 50% { opacity: .62; } }
      /* --- HERO CARD FLOURISH (Hall of Heroes) --- */
      @keyframes fhq-aura { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes fhq-hero-breathe { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.012); } }
      /* Full-body idle: weight-shift sway for most of the cycle, then an anticipation
         squash → hop → landing recover near the end. Origin at the feet. */
      @keyframes fhq-hero-idle {
        0%   { transform: rotate(0deg)    translateY(0)    scale(1, 1); }
        18%  { transform: rotate(-1.7deg) translateY(-1px) scale(1.012, 0.994); }
        38%  { transform: rotate(1.1deg)  translateY(0)    scale(0.994, 1.008); }
        56%  { transform: rotate(-0.7deg) translateY(-2px) scale(1, 1); }
        72%  { transform: rotate(0deg)    translateY(0)    scale(1, 1); }
        79%  { transform: translateY(2px)  scale(1.06, 0.93); }
        86%  { transform: translateY(-9px) scale(0.965, 1.07); }
        91%  { transform: translateY(0)    scale(1.04, 0.96); }
        95%  { transform: translateY(-2px) scale(0.99, 1.015); }
        100% { transform: rotate(0deg)    translateY(0)    scale(1, 1); }
      }
      @keyframes fhq-sweep { to { left: 115%; } }
      /* QB rig: shared 7s cycle — idle sway, then wind-up (lean back), SNAP forward,
         recover. The ball layer keys off the same clock: appears at the hand on the
         snap and spirals off the card. */
      @keyframes fhq-qb-body {
        0%,64% { transform: rotate(0deg) translateX(0) scale(1,1); opacity: 1; }
        14% { transform: rotate(-1.6deg) translateY(-1px) scale(1.01,0.995); }
        32% { transform: rotate(1.1deg) scale(0.995,1.006); }
        48% { transform: rotate(-0.6deg) translateY(-1px) scale(1,1); }
        72% { transform: rotate(-7deg) translateX(-5px) scale(1.03,0.96); opacity: 1; }
        82% { transform: rotate(-9deg) translateX(-7px) scale(1.05,0.94); opacity: 1; }
        83.5% { transform: rotate(-9deg) translateX(-7px); opacity: 0; }
        94% { opacity: 0; }
        96% { transform: rotate(0deg) translateX(0) scale(1,1); opacity: 1; }
        100% { transform: rotate(0deg) translateX(0) scale(1,1); opacity: 1; }
      }
      /* Pose B — the follow-through frame: snaps in at the release, rides the momentum
         forward, then hands back to pose A. */
      @keyframes fhq-qb-body2 {
        0%,82% { opacity: 0; transform: rotate(0deg) translateX(0); }
        83.5% { opacity: 1; transform: rotate(5deg) translateX(9px) scale(0.97,1.03); }
        88% { opacity: 1; transform: rotate(2deg) translateX(5px) scale(1.01,0.99); }
        93% { opacity: 1; transform: rotate(0deg) translateX(2px) scale(1,1); }
        95.5%,100% { opacity: 0; transform: rotate(0deg) translateX(0); }
      }
      @keyframes fhq-qb-ball {
        0%,79% { opacity: 0; transform: translate(0,0) scale(0.5) rotate(0deg); }
        83% { opacity: 1; transform: translate(4px,-2px) scale(0.9) rotate(20deg); }
        96% { opacity: 1; transform: translate(140px,-95px) scale(0.5) rotate(420deg); }
        97%,100% { opacity: 0; transform: translate(150px,-105px) scale(0.45) rotate(430deg); }
      }
      /* Two-frame walk cycle: A and B alternate on a square wave (near-instant crossfade
         at the 50% mark reads as a step, not a blend). */
      @keyframes fhq-stepA { 0%,49.5% { opacity: 1; } 50%,100% { opacity: 0; } }
      /* 4-frame walk: contact-L → passing → contact-R → passing (quarter phases) */
      @keyframes fhq-q1 { 0%,24.5% { opacity: 1; } 25%,100% { opacity: 0; } }
      @keyframes fhq-q2 { 0%,24.5% { opacity: 0; } 25%,49.5% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes fhq-q3 { 0%,49.5% { opacity: 0; } 50%,74.5% { opacity: 1; } 75%,100% { opacity: 0; } }
      @keyframes fhq-q4 { 0%,74.5% { opacity: 0; } 75%,100% { opacity: 1; } }
      @keyframes fhq-stepB { 0%,49.5% { opacity: 0; } 50%,100% { opacity: 1; } }
      /* Hero nameplate: readable at deploy, then drops to a whisper so it stops
         fighting the sprites and hit VFX for screen space. */
      @keyframes fhq-tagfade { 0%,55% { opacity: 1; } 100% { opacity: 0.28; } }
      /* ONE character layer at a time: when a unit's rig frames (walk/action) have
         loaded, the flat portrait fallback underneath goes fully invisible instead of
         peeking out around the frames' edges. */
      .fhq-unit[data-rig="1"] .fhq-flat { visibility: hidden; }
      /* --- JUICE PASS: gacha reveal, coin arcs, counter pops --- */
      @keyframes fhq-reveal-pulse { 0%,100% { transform: scale(1) rotate(-2.5deg); } 50% { transform: scale(1.09) rotate(2.5deg); } }
      @keyframes fhq-reveal-in { 0% { transform: scale(0.25); opacity: 0; } 55% { transform: scale(1.18); opacity: 1; } 75% { transform: scale(0.96); } 100% { transform: scale(1); opacity: 1; } }
      @keyframes fhq-reveal-burst { 0% { transform: scale(0.4); opacity: 0.9; } 100% { transform: scale(2.6); opacity: 0; } }
      /* Coin arc: X and Y animate on nested elements with different easing → curved flight */
      @keyframes fhq-coin-x { to { transform: translateX(var(--dx)); } }
      @keyframes fhq-coin-y { to { transform: translateY(var(--dy)); } }
      @keyframes fhq-counter-pop { 0% { transform: scale(1); } 40% { transform: scale(1.25); } 100% { transform: scale(1); } }
      @keyframes fhq-flashfade { 0% { opacity: 1; } 100% { opacity: 0; } }
      /* Sheet entrance: backdrop fades, panel slides up with a soft settle */
      @keyframes fhq-sheet-in { 0% { transform: translateY(26px) scale(0.985); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
      /* Mirrored flight for lefts-facing throws (QB's throwing hand is on the viewer's
         left; scaleX(-1) also flips the ball art so its flame trail points the right way). */
      /* Ball IN HAND: visible the whole cycle — rests in the raised hand, pulls back
         with the wind-up, snaps forward and flies downfield (right). */
      @keyframes fhq-ball-inhand {
        0% { opacity: 1; transform: translate(0,0) rotate(18deg) scale(0.8); }
        64% { opacity: 1; transform: translate(-1px,1px) rotate(16deg) scale(0.8); }
        72% { opacity: 1; transform: translate(-7px,4px) rotate(8deg) scale(0.82); }
        82% { opacity: 1; transform: translate(-9px,5px) rotate(6deg) scale(0.85); }
        83.5% { opacity: 1; transform: translate(6px,-6px) rotate(30deg) scale(0.9); }
        96% { opacity: 1; transform: translate(150px,-95px) rotate(420deg) scale(0.5); }
        97%,100% { opacity: 0; transform: translate(160px,-105px) rotate(430deg) scale(0.45); }
      }
      /* Card idle LEG LOOP: two weight-shift frames alternate every ~0.55s through the
         pose-A window (square wave = a step, not a blend), both hide during the action
         swap at 83.5–95%. Layered ON TOP of fhq-qb-body for the sway/wind-up transform —
         these are listed LAST in the animation list so their opacity wins over the body
         keyframes' own opacity keys. */
      @keyframes fhq-idleA {
        0%,9.9% { opacity: 1; } 10%,19.9% { opacity: 0; }
        20%,29.9% { opacity: 1; } 30%,39.9% { opacity: 0; }
        40%,49.9% { opacity: 1; } 50%,59.9% { opacity: 0; }
        60%,69.9% { opacity: 1; } 70%,79.9% { opacity: 0; }
        80%,83.4% { opacity: 1; } 83.5%,94.9% { opacity: 0; }
        95%,100% { opacity: 1; }
      }
      @keyframes fhq-idleB {
        0%,9.9% { opacity: 0; } 10%,19.9% { opacity: 1; }
        20%,29.9% { opacity: 0; } 30%,39.9% { opacity: 1; }
        40%,49.9% { opacity: 0; } 50%,59.9% { opacity: 1; }
        60%,69.9% { opacity: 0; } 70%,79.9% { opacity: 1; }
        80%,100% { opacity: 0; }
      }
      @keyframes fhq-ball-left {
        0%,79% { opacity: 0; transform: translate(0,0) scale(0.5) rotate(0deg) scaleX(-1); }
        83% { opacity: 1; transform: translate(-4px,-2px) scale(0.9) rotate(-20deg) scaleX(-1); }
        96% { opacity: 1; transform: translate(-140px,-95px) scale(0.5) rotate(-420deg) scaleX(-1); }
        97%,100% { opacity: 0; transform: translate(-150px,-105px) scale(0.45) rotate(-430deg) scaleX(-1); }
      }
      .fhq-shine { position: relative; overflow: hidden; }
      .fhq-shine::after { content: ''; position: absolute; top: -30%; bottom: -30%; width: 34%; left: -45%; background: linear-gradient(105deg, transparent, rgba(255,255,255,0.75), transparent); transform: skewX(-20deg); pointer-events: none; }
      .fhq-shine:hover::after { animation: fhq-sweep 0.6s ease-out; }
      @keyframes fhq-confetti { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(85vh) rotate(720deg); opacity: 0; } }
      @keyframes fade-in   { from { opacity: 0; } to { opacity: 1; } }

      /* --- MOBILE: kill double-tap zoom (iOS ignores user-scalable=no); inputs stay ≥16px
             so focus never auto-zooms the page --- */
      html, body { touch-action: manipulation; }
      input, select, textarea { font-size: 16px; }

      /* --- ACCESSIBILITY: honor reduced-motion (POLISH-PLAN D5) --- */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        /* leg-loop frames rely on animated opacity — with animations off they'd all
           sit at their inline opacity:0, so show the static body instead */
        .fhq-idleframe { display: none !important; }
        .fhq-basebody { visibility: visible !important; }
        /* cloud shade only exists as a moving thing — parked it's just a dark smudge */
        .fhq-cloud { display: none !important; }
        /* a parked "driving" car is just a car floating at the road's end */
        .fhq-traffic { display: none !important; }
        /* drill runners frozen mid-sprint with stacked frames read broken — hide them */
        .fhq-drillsquad { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
